server:
  port: ${SERVER_PORT:8086}
spring:
  application:
    name: traxs

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}